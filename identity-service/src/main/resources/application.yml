server:
  port: 8081

spring:
  application:
    name: identity-service
  datasource:
    # Port 3307 dùng khi bạn chạy ứng dụng Java trực tiếp từ IDE
    url: jdbc:mysql://localhost:3307/identity_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: leovmika68
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

grpc:
  server:
    port: 9090

jwt:
  # Nên dùng biến môi trường để bảo mật secret key
  secret: ${JWT_SECRET:2a0e929f81eb06a0b9eba5a39e24e91966608eee54bcb9ab}
  expiration: 86400000 
  refresh-expiration: 604800000

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # QUAN TRỌNG: Đổi 3307 thành 3306 khi chạy trong mạng Docker
    url: jdbc:mysql://mysql:3306/identity_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

eureka:
  instance:
    prefer-ip-address: true
    # Giúp định danh chính xác instance trên Eureka Dashboard
    instance-id: ${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/