server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      default-filters:
        - TokenRelay 
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/auth/**

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**, /api/media/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

grpc:
  client:
    identity-service:
      address: 'discovery:///identity-service'
      negotiationType: plaintext

jwt:
  secret: ${JWT_SECRET:2a0e929f81eb06a0b9eba5a39e24e91966608eee54bcb9ab}
