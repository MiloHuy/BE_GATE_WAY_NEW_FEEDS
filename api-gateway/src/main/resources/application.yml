server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

grpc:
  client:
    auth-service:
      address: 'discovery:///auth-service'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

# JWT secret — must match the secret used in identity-service
# Generate a Base64-encoded 256-bit key: openssl rand -base64 32
jwt:
  secret: 2a0e929f81eb06a0b9eba5a39e24e91966608eee54bcb9ab

# Redis (used for token blacklist / rate limiting if needed)
  data:
    redis:
      host: localhost
      port: 6379
