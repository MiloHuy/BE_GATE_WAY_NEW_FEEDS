server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/auth/**
        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/api/videos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

grpc:
  client:
    identity-service:
      address: 'discovery:///identity-service'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
