server:
  port: 8082

spring:
  application:
    name: post-service
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  datasource:
    url: jdbc:mysql://localhost:3307/post_db?createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

grpc:
  client:
    identity-service:
      address: 'discovery:///identity-service'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/post_db?createDatabaseIfNotExist=true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
