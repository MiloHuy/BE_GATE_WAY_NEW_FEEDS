version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: leovmika68
      MYSQL_DATABASE: identity_db
    ports:
      - "3307:3306"
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  discovery-server:
    build:
      context: .
      target: discovery-server
    container_name: discovery-server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8761:8761"
    networks:
      - backend
    depends_on:
      - redis
      - mysql

  identity-service:
    build:
      context: .
      target: identity-service
    container_name: identity-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
      - "9090:9090"
    networks:
      - backend
    depends_on:
      - discovery-server
      - mysql

  api-gateway:
    build:
      context: .
      target: api-gateway
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      - discovery-server
      - identity-service
      - redis

  post-service:
    build:
      context: .
      target: post-service
    container_name: post-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8082:8082"
    volumes:
      - ./post-uploads:/app/uploads
    networks:
      - backend
    depends_on:
      - discovery-server
      - mysql

networks:
  backend:
    driver: bridge
